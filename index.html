<!DOCTYPE html>
<html lang="es">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Tarifario Empresa de Parques y Eventos de Antioquia - ACTIVA</title>
  
  <!-- Tailwind CSS para el diseño -->
  <script src="https://cdn.tailwindcss.com"></script>
  
  <!-- FontAwesome para los iconos -->
  <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
  
  <!-- React & ReactDOM -->
  <script crossorigin src="https://unpkg.com/react@18/umd/react.production.min.js"></script>
  <script crossorigin src="https://unpkg.com/react-dom@18/umd/react-dom.production.min.js"></script>
  
  <!-- Babel para compilar React en el navegador -->
  <script src="https://unpkg.com/@babel/standalone/babel.min.js"></script>

  <!-- SheetJS con soporte para estilos (Colores y bordes en Excel) -->
  <script src="https://cdn.jsdelivr.net/npm/xlsx-js-style@1.2.0/dist/xlsx.bundle.js"></script>

  <style>
    /* Estilos extra para quitar scrollbars feas */
    .scrollbar-hide::-webkit-scrollbar { display: none; }
    .scrollbar-hide { -ms-overflow-style: none; scrollbar-width: none; }
  </style>

  <script>
    // Configuración de colores Tailwind para temática verde
    tailwind.config = {
      theme: {
        extend: {
          colors: {
            brand: {
              50: '#f0fdf4',
              100: '#dcfce7',
              200: '#bbf7d0',
              300: '#86efac',
              400: '#4ade80',
              500: '#22c55e',
              600: '#16a34a',
              700: '#15803d',
              800: '#166534',
              900: '#14532d',
            }
          }
        }
      }
    }
  </script>
</head>
<body class="bg-slate-50 text-slate-800 font-sans">
  
  <div id="root"></div>

  <script type="text/babel">
    const { useState, useMemo, useEffect } = React;

    // === URL REAL DE APPSCRIPT ===
    const SCRIPT_URL = "https://script.google.com/macros/s/AKfycbx5V-tVf5YElywdrJXdDOIf5n2FhjErd9MmOZ6IaTH2dwSmjShebWjxlh-7nCB-j1I/exec"; 
    // =================================================

    // Se actualizó para mapear exactamente con los nombres de las columnas de tu Google Sheets
    const REGIONES = {
      "AM": { nombre: "Área Metropolitana", columna: "Precio final Área Metropolitana" },
      "UR": { nombre: "Urabá", columna: "Urabá" },
      "SO": { nombre: "Suroeste", columna: "Suroeste" },
      "OC": { nombre: "Occidente", columna: "Occidente" },
      "NT": { nombre: "Norte", columna: "Norte" },
      "MM": { nombre: "Magdalena Medio", columna: "Magdalena Medio" },
      "ND": { nombre: "Nordeste", columna: "Nordeste" },
      "BC": { nombre: "Bajo Cauca", columna: "Bajo Cauca" },
      "OR": { nombre: "Oriente", columna: "Oriente" },
    };

    const CATEGORIAS = [
      "Todos", "Alimentación y bebidas", "Backline", "Impresos", 
      "Mobiliario", "Salud", "Suministros", "Técnico", "Transporte", "Varios"
    ];

    function App() {
      const [data, setData] = useState([]);
      const [observaciones, setObservaciones] = useState({});
      const [isLoading, setIsLoading] = useState(true);

      const [searchTerm, setSearchTerm] = useState("");
      const [selectedRegion, setSelectedRegion] = useState("AM");
      const [selectedCategory, setSelectedCategory] = useState("Todos");
      const [expandedRow, setExpandedRow] = useState(null);
      
      const [isUnlocked, setIsUnlocked] = useState(false);
      const [showAuthModal, setShowAuthModal] = useState(false);
      const [passwordInput, setPasswordInput] = useState("");
      const [authError, setAuthError] = useState("");
      
      // Controla el valor temporal de la observación que se está editando
      const [tempObsValue, setTempObsValue] = useState("");
      const [isSaving, setIsSaving] = useState(false);

      // Cargar datos públicos desde Google Sheets al abrir la página
      useEffect(() => {
        fetch(SCRIPT_URL)
          .then(res => res.json())
          .then(json => {
            setData(json.tarifario || []);
            // Las observaciones ya no vienen aquí, vendrán vacías hasta que se ponga la clave
            setIsLoading(false);
          })
          .catch(err => {
            console.error("Error cargando datos:", err);
            alert("Hubo un error conectando a la base de datos de Google Sheets.");
            setIsLoading(false);
          });
      }, []);

      const filteredData = useMemo(() => {
        return data.filter(item => {
          const codigo = item["Código"] || item["codigo"] || "";
          const desc = item["Descripción"] || item["descripcion"] || "";
          const caract = item["Características"] || item["caracteristicas"] || "";
          const grupo = item["Grupo"] || item["grupo"] || "";

          const matchSearch = 
            String(codigo).toLowerCase().includes(searchTerm.toLowerCase()) ||
            String(desc).toLowerCase().includes(searchTerm.toLowerCase()) ||
            String(caract).toLowerCase().includes(searchTerm.toLowerCase());
          
          const matchCategory = selectedCategory === "Todos" || grupo === selectedCategory;
          return matchSearch && matchCategory;
        });
      }, [data, searchTerm, selectedCategory]);

      const formatCurrency = (value) => {
        return new Intl.NumberFormat('es-CO', {
          style: 'currency', currency: 'COP', minimumFractionDigits: 0
        }).format(value);
      };

      // Autenticación segura enviando la clave al servidor
      const handleLogin = (e) => {
        e.preventDefault();
        setAuthError("");
        
        fetch(SCRIPT_URL, {
          method: 'POST',
          headers: { 'Content-Type': 'text/plain;charset=utf-8' },
          body: JSON.stringify({ action: "unlock", password: passwordInput })
        })
        .then(res => res.json())
        .then(data => {
            if (data.status === "Éxito") {
                setObservaciones(data.observaciones || {});
                setIsUnlocked(true);
                setShowAuthModal(false);
                setPasswordInput("");
                
                // Si había una fila expandida, cargamos su observación en el editor inmediatamente
                if (expandedRow) {
                    setTempObsValue(data.observaciones[expandedRow]?.texto || "");
                }
            } else {
                setAuthError(data.mensaje || "Contraseña incorrecta.");
            }
        })
        .catch(err => {
            setAuthError("Error de conexión con el servidor.");
        });
      };

      // Guardar observación y enviarla a Google Sheets (y correo)
      const saveObservation = (codigo) => {
        setIsSaving(true);
        const regionNombre = REGIONES[selectedRegion].nombre;

        fetch(SCRIPT_URL, {
          method: 'POST',
          headers: { 'Content-Type': 'text/plain;charset=utf-8' },
          body: JSON.stringify({ 
              action: "save",
              codigo: codigo, 
              observacion: tempObsValue,
              subregion: regionNombre
          })
        })
        .then(res => res.json())
        .then(response => {
           setObservaciones(prev => ({ 
               ...prev, 
               [codigo]: { texto: tempObsValue, subregion: regionNombre } 
           }));
           setIsSaving(false);
        })
        .catch(err => {
           console.error(err);
           alert("Error al guardar la observación. Verifica la conexión.");
           setIsSaving(false);
        });
      };

      // --- EXPORTACIÓN AVANZADA CON ESTILOS (XLSX-JS-STYLE) ---
      const exportToExcelAdvanced = () => {
        const dataForExcel = filteredData.map(item => {
            const codigo = item["Código"] || item["codigo"];
            
            // Creamos un objeto ordenado estrictamente con las columnas que solicitaste (sin observaciones)
            return {
                "Código": codigo,
                "Grupo": item["Grupo"] || item["grupo"] || "",
                "Descripción": item["Descripción"] || item["descripcion"] || "",
                "Características": item["Características"] || item["caracteristicas"] || "",
                "Rango": item["Rango"] || item["rango"] || "",
                "Precio final Área Metropolitana": parseFloat(item["Precio final Área Metropolitana"]) || 0,
                "Urabá": parseFloat(item["Urabá"]) || 0,
                "Suroeste": parseFloat(item["Suroeste"]) || 0,
                "Occidente": parseFloat(item["Occidente"]) || 0,
                "Norte": parseFloat(item["Norte"]) || 0,
                "Magdalena Medio": parseFloat(item["Magdalena Medio"]) || 0,
                "Nordeste": parseFloat(item["Nordeste"]) || 0,
                "Bajo Cauca": parseFloat(item["Bajo Cauca"]) || 0,
                "Oriente": parseFloat(item["Oriente"]) || 0
            };
        });

        const worksheet = XLSX.utils.json_to_sheet(dataForExcel);
        const range = XLSX.utils.decode_range(worksheet['!ref']);

        // --- ANCHOS DE COLUMNA DINÁMICOS ---
        const wscols = [];

        for (let C = range.s.c; C <= range.e.c; ++C) {
            const headerAddress = XLSX.utils.encode_cell({c: C, r: 0});
            if (worksheet[headerAddress]) {
                const headerText = String(worksheet[headerAddress].v).toLowerCase();
                
                // Asignar anchos dependiendo del nombre de la columna para que se vea bien
                if (headerText.includes("característica")) wscols.push({wch: 60});
                else if (headerText.includes("descripción")) wscols.push({wch: 40});
                else wscols.push({wch: 20});
            } else {
                wscols.push({wch: 20});
            }
        }
        worksheet['!cols'] = wscols;

        // --- APLICACIÓN DE COLORES Y BORDES ---
        for (let C = range.s.c; C <= range.e.c; ++C) {
            
            // 1. Estilo para los encabezados (Fila 0)
            const headerAddress = XLSX.utils.encode_cell({c: C, r: 0});
            if (worksheet[headerAddress]) {
                worksheet[headerAddress].s = {
                    fill: { fgColor: { rgb: "D5E8D4" } }, // Verde claro (verdecito)
                    font: { bold: true, color: { rgb: "000000" } },
                    border: {
                        top: { style: "thin", color: { rgb: "000000" } },
                        bottom: { style: "thin", color: { rgb: "000000" } },
                        left: { style: "thin", color: { rgb: "000000" } },
                        right: { style: "thin", color: { rgb: "000000" } }
                    },
                    alignment: { vertical: "center", horizontal: "center", wrapText: true }
                };
            }

            // 2. Estilo para las filas de datos
            for (let R = 1; R <= range.e.r; ++R) {
                const cellAddress = XLSX.utils.encode_cell({c: C, r: R});
                if (!worksheet[cellAddress]) continue;

                let cellStyle = {
                    border: {
                        top: { style: "thin", color: { rgb: "000000" } },
                        bottom: { style: "thin", color: { rgb: "000000" } },
                        left: { style: "thin", color: { rgb: "000000" } },
                        right: { style: "thin", color: { rgb: "000000" } }
                    },
                    alignment: { vertical: "top", wrapText: true } // Ajuste de texto para las descripciones
                };

                // Formato de moneda automático si el encabezado dice "Precio", "Valor" o coincide con nombres de subregiones
                const headerCell = worksheet[XLSX.utils.encode_cell({c: C, r: 0})];
                const headerText = headerCell && typeof headerCell.v === 'string' ? headerCell.v.toLowerCase() : "";
                
                const isCurrency = headerText.includes("precio") || 
                                   headerText.includes("valor") || 
                                   Object.values(REGIONES).some(r => headerText.includes(r.nombre.toLowerCase()) || headerText.includes(r.columna.toLowerCase()));
                
                if (isCurrency && typeof worksheet[cellAddress].v === 'number') {
                    cellStyle.numFmt = '"$"#,##0';
                }

                worksheet[cellAddress].s = cellStyle;
            }
        }

        const workbook = XLSX.utils.book_new();
        XLSX.utils.book_append_sheet(workbook, worksheet, "Tarifario");

        XLSX.writeFile(workbook, `Tarifario_Activa_${selectedRegion}.xlsx`);
      };

      // Pantalla de carga
      if (isLoading) {
        return (
          <div className="min-h-screen flex flex-col items-center justify-center bg-brand-50 text-brand-700">
             <i className="fa-solid fa-circle-notch fa-spin fa-3x mb-4"></i>
             <h2 className="text-xl font-bold">Cargando datos...</h2>
          </div>
        );
      }

      return (
        <div className="pb-10">
          
          {/* HEADER VERDE - Título Limpio y con Logo */}
          <header className="bg-brand-700 text-white p-6 shadow-md border-b-4 border-brand-500">
            <div className="max-w-7xl mx-auto flex flex-col md:flex-row md:items-center justify-between gap-4">
              <div className="flex items-center gap-4">
                {/* Logo Activa */}
                <img src="logo.png" alt="Logo Activa" className="h-14 object-contain bg-white rounded p-1" />
                <h1 className="text-2xl md:text-3xl font-bold">
                  Tarifario Empresa de Parques y Eventos de Antioquia - ACTIVA
                </h1>
              </div>
              
              <div className="flex flex-wrap items-center gap-3">
                <button 
                  onClick={exportToExcelAdvanced}
                  className="flex items-center gap-2 bg-brand-500 hover:bg-brand-600 border border-brand-400 px-5 py-2.5 rounded-lg text-sm font-bold shadow-sm transition-colors"
                >
                  Descargar a Excel
                </button>
              </div>
            </div>
          </header>

          {/* MODAL DE AUTENTICACIÓN (Se activa desde adentro del ítem) */}
          {showAuthModal && (
            <div className="fixed inset-0 z-50 flex items-center justify-center bg-black/50 backdrop-blur-sm p-4">
              <div className="bg-white rounded-xl shadow-2xl max-w-md w-full overflow-hidden border-t-4 border-brand-500">
                <div className="bg-slate-50 px-6 py-4 flex justify-between items-center text-slate-800 border-b">
                  <h3 className="font-bold text-lg"><i className="fa-solid fa-shield-halved text-brand-600 mr-2"></i>Acceso Restringido</h3>
                  <button onClick={() => setShowAuthModal(false)} className="text-slate-400 hover:text-red-500 transition-colors"><i className="fa-solid fa-times text-xl"></i></button>
                </div>
                <form onSubmit={handleLogin} className="p-6">
                  <p className="text-sm text-slate-600 mb-4">Ingresa la contraseña para desbloquear las observaciones de los ítems.</p>
                  <input type="password" value={passwordInput} onChange={(e) => setPasswordInput(e.target.value)} className="w-full px-4 py-3 border border-slate-300 rounded-lg outline-none mb-2 focus:ring-2 focus:ring-brand-500 focus:border-brand-500" autoFocus />
                  {authError && <div className="text-red-500 text-sm mb-4 font-medium"><i className="fa-solid fa-exclamation-circle"></i> {authError}</div>}
                  <div className="flex justify-end gap-3 mt-6">
                    <button type="button" onClick={() => setShowAuthModal(false)} className="px-4 py-2 text-slate-600 font-medium hover:bg-slate-100 rounded-lg">Cancelar</button>
                    <button type="submit" className="px-6 py-2 bg-brand-600 hover:bg-brand-700 text-white font-bold rounded-lg shadow-sm transition-colors">Desbloquear</button>
                  </div>
                </form>
              </div>
            </div>
          )}

          <main className="max-w-7xl mx-auto px-4 sm:px-6 mt-8">
            
            {/* BUSCADOR Y REGIONES */}
            <div className="bg-white p-5 rounded-xl shadow-sm border border-slate-200 mb-6 flex flex-col md:flex-row gap-4">
              <div className="flex-1 relative">
                <div className="absolute inset-y-0 left-0 pl-3 flex items-center pointer-events-none text-slate-400"><i className="fa-solid fa-search"></i></div>
                <input type="text" placeholder="Buscar por código, descripción o palabra clave..." className="w-full pl-10 pr-4 py-3 border rounded-lg focus:ring-2 focus:ring-brand-500 outline-none text-slate-700 font-medium" value={searchTerm} onChange={(e) => setSearchTerm(e.target.value)} />
              </div>
              <div className="md:w-64 relative">
                <div className="absolute inset-y-0 left-0 pl-3 flex items-center pointer-events-none text-brand-600"><i className="fa-solid fa-map-location-dot"></i></div>
                <select className="w-full pl-10 pr-10 py-3 border rounded-lg appearance-none focus:ring-2 focus:ring-brand-500 outline-none bg-brand-50 text-brand-900 font-bold cursor-pointer" value={selectedRegion} onChange={(e) => setSelectedRegion(e.target.value)}>
                  {Object.entries(REGIONES).map(([key, d]) => <option key={key} value={key}>{d.nombre}</option>)}
                </select>
                <div className="absolute inset-y-0 right-0 pr-3 flex items-center pointer-events-none text-brand-600"><i className="fa-solid fa-chevron-down"></i></div>
              </div>
            </div>

            {/* CHIPS DE CATEGORÍA VERDES */}
            <div className="mb-6 overflow-x-auto pb-2 scrollbar-hide">
              <div className="flex gap-2">
                {CATEGORIAS.map(cat => (
                  <button key={cat} onClick={() => setSelectedCategory(cat)} className={`whitespace-nowrap px-4 py-2 rounded-full text-sm font-bold transition-all ${selectedCategory === cat ? 'bg-brand-600 text-white shadow-md' : 'bg-white text-slate-600 border border-slate-300 hover:bg-brand-50 hover:text-brand-700 hover:border-brand-200'}`}>
                    {cat}
                  </button>
                ))}
              </div>
            </div>

            {/* TABLA DE RESULTADOS */}
            <div className="bg-white rounded-xl shadow-md border border-slate-200 overflow-hidden">
              <div className="bg-brand-50 px-6 py-4 border-b border-brand-100 text-sm font-medium text-brand-800 flex flex-col sm:flex-row justify-between items-center gap-2">
                <span>Mostrando <span className="font-bold">{filteredData.length}</span> resultados</span>
                <span className="bg-white px-3 py-1 rounded-full border border-brand-200 text-brand-700 shadow-sm">
                    <i className="fa-solid fa-calculator mr-1"></i> Precios directos para: <b className="text-brand-900 uppercase">{REGIONES[selectedRegion].nombre}</b>
                </span>
              </div>

              <div className="overflow-x-auto">
                <table className="w-full text-left border-collapse">
                  <thead>
                    <tr className="bg-slate-50 text-slate-500 text-xs uppercase tracking-wider border-b border-slate-200">
                      <th className="px-6 py-4 font-bold w-24">Código</th>
                      <th className="px-6 py-4 font-bold w-40">Grupo</th>
                      <th className="px-6 py-4 font-bold">Descripción</th>
                      <th className="px-6 py-4 font-bold">Rango / Medida</th>
                      <th className="px-6 py-4 font-bold text-right">Precio Final</th>
                    </tr>
                  </thead>
                  <tbody className="divide-y divide-slate-100">
                    {filteredData.length > 0 ? filteredData.map((item) => {
                      const codigo = item["Código"] || item["codigo"];
                      const grupo = item["Grupo"] || item["grupo"];
                      const descripcion = item["Descripción"] || item["descripcion"];
                      const caracteristicas = item["Características"] || item["caracteristicas"];
                      const rango = item["Rango"] || item["rango"];
                      
                      // Extraemos el precio directamente de la columna de la región seleccionada (sin multiplicar)
                      const nombreColumnaRegion = REGIONES[selectedRegion].columna;
                      let precioExacto = parseFloat(item[nombreColumnaRegion]);
                      
                      // Fallback por si la columna se llama exactamente igual al nombre de la región 
                      if (isNaN(precioExacto)) {
                          precioExacto = parseFloat(item[REGIONES[selectedRegion].nombre]) || 0;
                      }

                      const isExpanded = expandedRow === codigo;
                      const obsData = observaciones[codigo] || {};

                      return (
                        <React.Fragment key={codigo}>
                          <tr 
                            className={`hover:bg-brand-50/50 cursor-pointer group transition-colors ${isExpanded ? 'bg-brand-50' : ''}`} 
                            onClick={() => {
                                const isExpanding = expandedRow !== codigo;
                                setExpandedRow(isExpanding ? codigo : null);
                                // Si se expande y ya está desbloqueado, cargamos el texto de este código al editor
                                if (isExpanding && isUnlocked) {
                                    setTempObsValue(observaciones[codigo]?.texto || "");
                                }
                            }}
                          >
                            <td className="px-6 py-4 text-sm font-black text-slate-700 relative">
                              {codigo}
                              {obsData.texto && isUnlocked && <div className="absolute top-1/2 -translate-y-1/2 right-2 w-2 h-2 bg-amber-400 rounded-full shadow-sm" title="Tiene observación"></div>}
                            </td>
                            <td className="px-6 py-4 text-sm"><span className="px-2 py-1 bg-slate-100 text-slate-600 rounded text-xs font-semibold">{grupo}</span></td>
                            <td className="px-6 py-4 text-sm text-slate-800 font-semibold">
                              {descripcion}
                              <div className="text-xs text-brand-600 mt-1 opacity-0 group-hover:opacity-100 transition-opacity font-bold">
                                {isExpanded ? 'Ocultar detalles ▲' : 'Ver características ▼'}
                              </div>
                            </td>
                            <td className="px-6 py-4 text-sm text-slate-500 font-medium">{rango}</td>
                            <td className="px-6 py-4 text-sm font-black text-brand-700 text-right">{formatCurrency(precioExacto)}</td>
                          </tr>

                          {/* FILA EXPANDIBLE */}
                          {isExpanded && (
                            <tr className="bg-slate-50 border-b-2 border-brand-200">
                              <td colSpan="5" className="px-6 py-6">
                                <div className="grid grid-cols-1 lg:grid-cols-2 gap-6">
                                  
                                  {/* ESPECIFICACIONES */}
                                  <div className="bg-white p-5 rounded-xl border border-slate-200 shadow-sm">
                                    <h4 className="text-xs font-bold uppercase text-slate-500 mb-3 border-b pb-2 flex items-center">
                                        <div className="bg-slate-100 p-1.5 rounded mr-2"><i className="fa-solid fa-list-check text-slate-600"></i></div> 
                                        Especificaciones Técnicas
                                    </h4>
                                    <p className="text-sm text-slate-700 whitespace-pre-line leading-relaxed">{caracteristicas}</p>
                                  </div>

                                  {/* OBSERVACIONES Y SEGURIDAD DESDE EL ÍTEM */}
                                  <div className="bg-amber-50 p-5 rounded-xl border border-amber-200 shadow-sm relative">
                                    <h4 className="text-xs font-bold uppercase text-amber-800 mb-3 flex justify-between items-center border-b border-amber-200 pb-2">
                                      <span className="flex items-center">
                                          <div className={`p-1.5 rounded mr-2 ${isUnlocked ? 'bg-amber-200 text-amber-700' : 'bg-slate-200 text-slate-500'}`}>
                                            <i className={`fa-solid ${isUnlocked ? 'fa-lock-open' : 'fa-lock'}`}></i>
                                          </div>
                                          Observación Interna
                                      </span>
                                      
                                      {/* Controles del ítem */}
                                      <div className="flex gap-2">
                                        {isUnlocked && (
                                            <button onClick={() => { setIsUnlocked(false); }} className="text-slate-600 hover:text-slate-800 bg-slate-200 hover:bg-slate-300 px-3 py-1 rounded transition-colors text-xs font-bold"><i className="fa-solid fa-lock"></i> Bloquear</button>
                                        )}
                                      </div>
                                    </h4>

                                    {!isUnlocked ? (
                                      <div className="text-center py-6">
                                        <div className="bg-amber-100 w-16 h-16 rounded-full flex items-center justify-center mx-auto mb-3">
                                            <i className="fa-solid fa-lock text-amber-400 text-2xl"></i>
                                        </div>
                                        <p className="text-sm font-bold text-amber-900 mb-1">Contenido Privado</p>
                                        <p className="text-xs text-amber-700 mb-4">Requiere permisos para ver o editar la observación.</p>
                                        <button onClick={() => setShowAuthModal(true)} className="px-5 py-2 bg-slate-800 text-white text-sm font-bold rounded-lg hover:bg-slate-900 transition-colors shadow-md"><i className="fa-solid fa-key mr-2"></i>Desbloquear Ítem</button>
                                      </div>
                                    ) : (
                                      <div className="h-full">
                                          <div className="flex flex-col gap-2">
                                            <textarea 
                                                value={tempObsValue} 
                                                onChange={(e) => setTempObsValue(e.target.value)} 
                                                placeholder="Escribe una nota interna confidencial para este ítem..." 
                                                className="w-full p-3 border-2 border-amber-300 rounded-lg text-sm outline-none resize-y min-h-[100px] focus:border-amber-500 bg-white" 
                                                disabled={isSaving} 
                                            />
                                            
                                            {obsData.subregion && (
                                                <div className="pt-1 flex items-center gap-1 text-xs text-amber-800 font-bold">
                                                    <i className="fa-solid fa-map-pin"></i> Última subregión registrada: {obsData.subregion}
                                                </div>
                                            )}

                                            <div className="flex justify-end mt-2">
                                              <button onClick={() => saveObservation(codigo)} className="px-4 py-2 text-xs font-bold bg-amber-500 text-amber-950 rounded-lg hover:bg-amber-400 transition-colors shadow-sm" disabled={isSaving}>
                                                {isSaving ? <i className="fa-solid fa-circle-notch fa-spin mr-1"></i> : <i className="fa-solid fa-cloud-arrow-up mr-1"></i>} Guardar Nota
                                              </button>
                                            </div>
                                          </div>
                                      </div>
                                    )}
                                  </div>
                                </div>
                              </td>
                            </tr>
                          )}
                        </React.Fragment>
                      );
                    }) : (
                      <tr>
                        <td colSpan="5" className="px-6 py-16 text-center">
                          <div className="inline-flex items-center justify-center w-16 h-16 rounded-full bg-slate-100 mb-4">
                              <i className="fa-solid fa-box-open text-2xl text-slate-300"></i>
                          </div>
                          <p className="text-lg font-bold text-slate-600">No se encontraron ítems</p>
                          <p className="text-sm text-slate-400 mt-1">Intenta buscar con otra palabra clave o categoría.</p>
                        </td>
                      </tr>
                    )}
                  </tbody>
                </table>
              </div>
            </div>
          </main>
        </div>
      );
    }

    const root = ReactDOM.createRoot(document.getElementById('root'));
    root.render(<App />);
  </script>
</body>
</html>
